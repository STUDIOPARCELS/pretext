var ravenImg = new Image();
var ravenReady = false;

// Offscreen canvas to create black silhouette from the outline PNG
var offCvs = document.createElement('canvas');
var offCtx = offCvs.getContext('2d');

ravenImg.onload = function() {
  // Draw original, then use source-atop with black fill to make solid black
  offCvs.width  = ravenImg.naturalWidth;
  offCvs.height = ravenImg.naturalHeight;
  offCtx.drawImage(ravenImg, 0, 0);
  // Invert: the outline is dark on white — use destination-out to cut white, leave dark
  // Better: draw black rect, composite source image with multiply-like approach
  // Cleanest: use the image as mask
  offCtx.globalCompositeOperation = 'source-in';
  // Actually: image is lines on white. We want black silhouette.
  // Draw the image normally first, then darken everything that is not white.
  // Reset and try: draw solid black, then use destination-in with the inverted image
  offCtx.clearRect(0, 0, offCvs.width, offCvs.height);
  // Step 1: fill black
  offCtx.fillStyle = '#000';
  offCtx.globalCompositeOperation = 'source-over';
  offCtx.fillRect(0, 0, offCvs.width, offCvs.height);
  // Step 2: use the raven image (dark lines on white) as mask
  // multiply: black stays black where source is dark
  offCtx.globalCompositeOperation = 'destination-in';
  // The image has dark pixels on white — we need to invert the alpha
  // Draw image with multiply to keep dark pixels
  // Simplest reliable: draw image with globalAlpha, then use it directly
  // The PNG likely has black lines on white — use it directly with multiply blend
  offCtx.globalCompositeOperation = 'source-over';
  offCtx.clearRect(0, 0, offCvs.width, offCvs.height);
  offCtx.drawImage(ravenImg, 0, 0);
  // Now process pixels: make dark pixels opaque black, white pixels transparent
  var imgData = offCtx.getImageData(0, 0, offCvs.width, offCvs.height);
  var d = imgData.data;
  for (var i = 0; i < d.length; i += 4) {
    var brightness = (d[i] + d[i+1] + d[i+2]) / 3;
    // Dark = part of raven, light = background
    if (brightness < 180) {
      d[i] = 0; d[i+1] = 0; d[i+2] = 0;
      d[i+3] = Math.round((1 - brightness/255) * 255);
    } else {
      d[i+3] = 0; // transparent
    }
  }
  offCtx.putImageData(imgData, 0, 0);
  ravenReady = true;
};
ravenImg.src = RAVEN_B64;

// ── Canvas ────────────────────────────────────────────────────
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var DPR = Math.min(window.devicePixelRatio || 1, 2);
var VW = window.innerWidth, VH = window.innerHeight;

function resize() {
  VW = window.innerWidth; VH = window.innerHeight;
  canvas.width = VW * DPR; canvas.height = VH * DPR;
  canvas.style.width = VW + 'px'; canvas.style.height = VH + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', function() { resize(); buildLines(); });

// ── Font & layout ─────────────────────────────────────────────
var FS, FONT, FONTI, FONTB, LH, PX, MW, TOP, SPW;

function initLayout() {
  FS   = Math.round(Math.min(Math.max(VW / 52, 13), 20));
  FONT  = FS + 'px \"IM Fell English\", Georgia, serif';
  FONTI = 'italic ' + FS + 'px \"IM Fell English\", Georgia, serif';
  FONTB = 'bold ' + Math.round(FS * 1.5) + 'px \"IM Fell English\", Georgia, serif';
  LH   = Math.round(FS * 2.1);
  PX   = Math.round(VW * 0.07);
  MW   = VW - PX * 2;
  TOP  = Math.round(VH * 0.10);
  ctx.font = FONT;
  SPW = ctx.measureText(' ').width;
}
initLayout();

// ── Words ─────────────────────────────────────────────────────
var words = [];

function getFont(f) {
  if (f === 'title') return FONTB;
  if (f === 'sub')   return FONTI;
  return FONT;
}

function buildLines() {
  initLayout();
  words = [];
  var y = TOP + LH;
  for (var pi = 0; pi < POEM.length; pi++) {
    var line = POEM[pi];
    if (line.f === 'gap' || !line.t) { y += LH * 0.5; continue; }
    var fnt = getFont(line.f);
    ctx.font = fnt;
    var sp = ctx.measureText(' ').width;
    var toks = line.t.split(' ').filter(function(s){ return s.length > 0; });
    var row = [], rw = 0;
    for (var ti = 0; ti < toks.length; ti++) {
      var tok = toks[ti];
      var tw = ctx.measureText(tok).width;
      var add = row.length ? sp + tw : tw;
      if (row.length && rw + add > MW) { flushRow(row, y, fnt, sp); y += LH; row = []; rw = 0; }
      row.push({ text: tok, w: tw });
      rw += row.length > 1 ? sp + tw : tw;
    }
    if (row.length) { flushRow(row, y, fnt, sp); y += LH; }
  }
}

function flushRow(row, y, fnt, sp) {
  var x = PX;
  for (var i = 0; i < row.length; i++) {
    var wd = row[i];
    words.push({ text: wd.text, w: wd.w, font: fnt, baseX: x, baseY: y, x: x, y: y, tx: x, ty: y });
    x += wd.w + sp;
  }
}

buildLines();
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(function(){ setTimeout(buildLines, 60); });
}

// ── Raven position & physics ──────────────────────────────────
var RS = Math.min(VW, VH) * 0.32; // render size of raven (pixels)
var rx = VW * 0.55, ry = VH * 0.35;
var rtx = rx, rty = ry;
var autoT = 0;
var dragging = false, dragOX = 0, dragOY = 0;

// Aspect ratio of the raven image (will update once loaded)
var imgAR = 1.2; // width/height approx from the square-ish image

function ravenW() { return RS; }
function ravenH() { return ravenReady ? RS / (offCvs.width / offCvs.height) : RS * 0.8; }

// Exclusion circles for text reflow (relative to raven center)
// Image is roughly: body center, two wings spread left/right, tail right, head+beak top-left
function getExclusions(lineY) {
  var rw = ravenW(), rh = ravenH();
  // raven center is at (rx, ry); image drawn from top-left offset
  var imgX = rx - rw * 0.5;
  var imgY = ry - rh * 0.5;

  // Define elliptical hit zones relative to image corners (normalized 0-1)
  var zones = [
    { nx: 0.5,  ny: 0.42, rx2: 0.20, ry2: 0.22 }, // main body
    { nx: 0.18, ny: 0.30, rx2: 0.14, ry2: 0.15 }, // left wing tip area
    { nx: 0.82, ny: 0.30, rx2: 0.14, ry2: 0.15 }, // right wing spread
    { nx: 0.20, ny: 0.18, rx2: 0.10, ry2: 0.12 }, // head
    { nx: 0.08, ny: 0.16, rx2: 0.06, ry2: 0.06 }, // beak
    { nx: 0.50, ny: 0.75, rx2: 0.12, ry2: 0.10 }, // legs/feet
    { nx: 0.72, ny: 0.60, rx2: 0.10, ry2: 0.08 }, // tail lower
  ];

  var ivs = [];
  for (var i = 0; i < zones.length; i++) {
    var z = zones[i];
    var cx = imgX + z.nx * rw;
    var cy = imgY + z.ny * rh;
    var zrx = z.rx2 * rw * 1.3;
    var zry = z.ry2 * rh * 1.5;
    var dy = Math.abs(lineY - cy);
    if (dy >= zry) continue;
    var ratio = dy / zry;
    var xs = zrx * Math.sqrt(1 - ratio * ratio);
    ivs.push([cx - xs, cx + xs]);
  }

  ivs.sort(function(a,b){ return a[0]-b[0]; });
  var merged = [];
  for (var j = 0; j < ivs.length; j++) {
    var iv = ivs[j];
    if (merged.length && iv[0] <= merged[merged.length-1][1])
      merged[merged.length-1][1] = Math.max(merged[merged.length-1][1], iv[1]);
    else merged.push([iv[0], iv[1]]);
  }
  return merged;
}

function freeSegs(excl) {
  var segs = [], cur = PX, right = PX + MW, GAP = SPW * 0.5;
  for (var i = 0; i < excl.length; i++) {
    var a = excl[i][0] - GAP, b = excl[i][1] + GAP;
    if (cur + 20 < a) segs.push([cur, a]);
    cur = b;
  }
  if (cur < right) segs.push([cur, right]);
  return segs.length ? segs : [[PX, PX + MW]];
}

// ── Reflow ────────────────────────────────────────────────────
function reflow() {
  if (!words.length) return;
  ctx.font = FONT;
  var spw = ctx.measureText(' ').width;
  var wi = 0, y = TOP + LH;

  while (wi < words.length) {
    var baseY = words[wi].baseY;
    var row = [];
    while (wi < words.length && words[wi].baseY === baseY) row.push(words[wi++]);

    var excl = getExclusions(y);
    var segs = freeSegs(excl);
    var si = 0, cx2 = segs[0][0];

    for (var ri = 0; ri < row.length; ri++) {
      var wd = row[ri];
      ctx.font = wd.font;
      var placed = false;
      while (si < segs.length) {
        if (cx2 + wd.w <= segs[si][1] + 1) {
          wd.tx = cx2; wd.ty = y; cx2 += wd.w + spw; placed = true; break;
        }
        si++; if (si < segs.length) cx2 = segs[si][0];
      }
      if (!placed) {
        y += LH; excl = getExclusions(y); segs = freeSegs(excl);
        si = 0; cx2 = segs[0][0];
        wd.tx = cx2; wd.ty = y; cx2 += wd.w + spw;
      }
    }
    y += LH;
  }
}

// ── Draw ──────────────────────────────────────────────────────
function drawRaven() {
  var rw = ravenW(), rh = ravenH();
  if (ravenReady) {
    // Draw the processed silhouette (black on transparent)
    ctx.drawImage(offCvs, rx - rw * 0.5, ry - rh * 0.5, rw, rh);
  } else {
    // Fallback circle while image processes
    ctx.beginPath();
    ctx.arc(rx, ry, rw * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = '#111'; ctx.fill();
  }
}

function drawText() {
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.textBaseline = 'alphabetic';
  for (var i = 0; i < words.length; i++) {
    var w = words[i];
    if (w.y < -LH * 2 || w.y > VH + LH * 2) continue;
    ctx.font = w.font; ctx.fillStyle = 'rgba(12,10,8,0.86)';
    ctx.fillText(w.text, w.x, w.y);
  }
}

// ── Pointer ───────────────────────────────────────────────────
function hitTest(ex, ey) {
  var rw = ravenW(), rh = ravenH();
  return ex > rx - rw * 0.55 && ex < rx + rw * 0.55 &&
         ey > ry - rh * 0.55 && ey < ry + rh * 0.55;
}

canvas.addEventListener('mousedown', function(e) {
  if (hitTest(e.clientX, e.clientY)) {
    dragging = true; dragOX = e.clientX - rx; dragOY = e.clientY - ry;
    canvas.style.cursor = 'grabbing';
  }
});
window.addEventListener('mousemove', function(e) {
  if (dragging) { rtx = e.clientX - dragOX; rty = e.clientY - dragOY; }
  else canvas.style.cursor = hitTest(e.clientX, e.clientY) ? 'grab' : 'default';
});
window.addEventListener('mouseup', function() { dragging = false; canvas.style.cursor = 'default'; });

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var t = e.touches[0];
  if (hitTest(t.clientX, t.clientY)) { dragging = true; dragOX = t.clientX - rx; dragOY = t.clientY - ry; }
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (dragging) { rtx = e.touches[0].clientX - dragOX; rty = e.touches[0].clientY - dragOY; }
}, { passive: false });
canvas.addEventListener('touchend', function() { dragging = false; });

// ── Loop ──────────────────────────────────────────────────────
var last = 0;
function frame(ts) {
  var dt = Math.min((ts - last) / 1000, 0.05); last = ts;

  if (!dragging) {
    autoT += dt * 0.22;
    var driftX = VW * 0.52 + Math.sin(autoT * 0.7) * VW * 0.14;
    var driftY = VH * 0.32 + Math.sin(autoT) * VH * 0.07;
    rtx += (driftX - rtx) * 0.003;
    rty += (driftY - rty) * 0.003;
  }

  rx += (rtx - rx) * 0.13;
  ry += (rty - ry) * 0.13;

  reflow();

  var L = 0.14;
  for (var i = 0; i < words.length; i++) {
    words[i].x += (words[i].tx - words[i].x) * L;
    words[i].y += (words[i].ty - words[i].y) * L;
  }

  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, VW, VH);
  drawText();
  drawRaven();

  ctx.font = '10px Georgia, serif';
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('drag the raven', PX, VH - 16);

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
