<script>

var POEM=[
["THE RAVEN","B"],["Edgar Allan Poe · 1845","I"],["","G"],
["Once upon a midnight dreary, while I pondered, weak and weary,","N"],
["Over many a quaint and curious volume of forgotten lore—","N"],
["While I nodded, nearly napping, suddenly there came a tapping,","N"],
["As of some one gently rapping, rapping at my chamber door.","N"],
["Only this and nothing more.","N"],["","G"],
["Ah, distinctly I remember it was in the bleak December;","N"],
["And each separate dying ember wrought its ghost upon the floor;","N"],
["Eagerly I wished the morrow;—vainly I had sought to borrow","N"],
["From my books surcease of sorrow—sorrow for the lost Lenore—","N"],
["For the rare and radiant maiden whom the angels name Lenore—","N"],
["Nameless here for evermore.","N"],["","G"],
["And the silken, sad, uncertain rustling of each purple curtain","N"],
["Thrilled me—filled me with fantastic terrors never felt before;","N"],
["So that now, to still the beating of my heart, I stood repeating,","N"],
["This it is and nothing more.","N"],["","G"],
["Deep into that darkness peering, long I stood there wondering, fearing,","N"],
["Doubting, dreaming dreams no mortal ever dared to dream before;","N"],
["But the silence was unbroken, and the stillness gave no token,","N"],
["Merely this and nothing more.","N"],["","G"],
["Open here I flung the shutter, when, with many a flirt and flutter,","N"],
["In there stepped a stately Raven of the saintly days of yore;","N"],
["Not the least obeisance made he; not a minute stopped or stayed he;","N"],
["But, with mien of lord or lady, perched above my chamber door—","N"],
["Perched upon a bust of Pallas just above my chamber door—","N"],
["Perched, and sat, and nothing more.","N"],["","G"],
["Then this ebony bird beguiling my sad fancy into smiling,","N"],
["By the grave and stern decorum of the countenance it wore,","N"],
["Ghastly grim and ancient Raven wandering from the Nightly shore—","N"],
["Tell me what thy lordly name is on the Plutonian shore!","N"],
["Quoth the Raven “Nevermore.”","N"],["","G"],
["But the Raven, sitting lonely on the placid bust, spoke only","N"],
["That one word, as if his soul in that one word he did outpour.","N"],
["Nothing further then he uttered—not a feather then he fluttered—","N"],
["On the morrow he will leave me, as my Hopes have flown before.","N"],
["Then the bird said “Nevermore.”","N"],["","G"],
["Whether Tempter sent, or whether tempest tossed thee here ashore,","N"],
["Desolate yet all undaunted, on this desert land enchanted—","N"],
["On this home by Horror haunted—tell me truly, I implore—","N"],
["Is there—is there balm in Gilead?—tell me—tell me, I implore!","N"],
["Quoth the Raven “Nevermore.”","N"],["","G"],
["And the Raven, never flitting, still is sitting, still is sitting","N"],
["On the pallid bust of Pallas just above my chamber door;","N"],
["And his eyes have all the seeming of a demon that is dreaming,","N"],
["And the lamp-light streaming throws his shadow on the floor;","N"],
["And my soul from out that shadow that lies floating on the floor","N"],
["Shall be lifted—nevermore!","N"]
];

var VW=window.innerWidth,VH=window.innerHeight;
var DPR=Math.min(window.devicePixelRatio||1,2);
var glC=document.getElementById("gl"),txC=document.getElementById("tx");
var gl=glC.getContext("webgl")||glC.getContext("experimental-webgl");
var ctx=txC.getContext("2d");

function setSize(){
  VW=window.innerWidth;VH=window.innerHeight;
  glC.width=VW*DPR;glC.height=VH*DPR;
  glC.style.width=VW+"px";glC.style.height=VH+"px";
  txC.width=VW*DPR;txC.height=VH*DPR;
  txC.style.width=VW+"px";txC.style.height=VH+"px";
  ctx.setTransform(DPR,0,0,DPR,0,0);
  if(gl)gl.viewport(0,0,glC.width,glC.height);
}
setSize();
window.addEventListener("resize",function(){setSize();buildLines();});

/* WebGL */
var prog,uTex,uRaven,ravenTex=null;
if(gl){
  var vs="attribute vec2 p;varying vec2 v;void main(){v=p*.5+.5;gl_Position=vec4(p,0,1);}";
  var fs=[
    "precision mediump float;",
    "varying vec2 v;",
    "uniform sampler2D u;",
    "uniform vec4 r;",
    "void main(){",
    "  vec4 c=vec4(1);",
    "  vec2 l=(v-r.xy)/r.zw;",
    "  if(l.x>0.&&l.x<1.&&l.y>0.&&l.y<1.){",
    "    vec4 t=texture2D(u,vec2(l.x,1.-l.y));",
    "    float lm=dot(t.rgb,vec3(.299,.587,.114));",
    "    float a=clamp((1.-lm)*3.,0.,1.)*t.a;",
    "    c=mix(c,vec4(.06,.05,.04,1.),a);",
    "  }",
    "  gl_FragColor=c;",
    "}"
  ].join("");
  function sh(type,src){var s=gl.createShader(type);gl.shaderSource(s,src);gl.compileShader(s);return s;}
  prog=gl.createProgram();
  gl.attachShader(prog,sh(gl.VERTEX_SHADER,vs));
  gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,fs));
  gl.linkProgram(prog);gl.useProgram(prog);
  var buf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,1,-1,-1,1,1,1]),gl.STATIC_DRAW);
  var ap=gl.getAttribLocation(prog,"p");
  gl.enableVertexAttribArray(ap);gl.vertexAttribPointer(ap,2,gl.FLOAT,false,0,0);
  uTex=gl.getUniformLocation(prog,"u");
  uRaven=gl.getUniformLocation(prog,"r");
  var img=new Image();
  img.onload=function(){
    ravenTex=gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D,ravenTex);
    gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,img);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
  };
  img.src=RSRC;
}

/* Typography */
var FS,LH,PX,MW,TOP;
function it(){FS=Math.round(Math.min(Math.max(VW/52,13),21));LH=Math.round(FS*2.1);PX=Math.round(VW*.07);MW=VW-PX*2;TOP=Math.round(VH*.09);}
it();
function fN(){return FS+'px "IM Fell English",Georgia,serif';}
function fI(){return "italic "+FS+'px "IM Fell English",Georgia,serif';}
function fB(){return "bold "+Math.round(FS*1.5)+'px "IM Fell English",Georgia,serif';}
function fc(c){return c==="B"?fB():c==="I"?fI():fN();}

var words=[];
function buildLines(){
  it();words=[];
  var y=TOP+LH;
  for(var i=0;i<POEM.length;i++){
    var txt=POEM[i][0],code=POEM[i][1];
    if(code==="G"||!txt){y+=LH*.5;continue;}
    var f=fc(code);ctx.font=f;
    var sp=ctx.measureText(" ").width;
    var toks=txt.split(" ").filter(function(s){return s.length>0;});
    var row=[],rw=0;
    for(var j=0;j<toks.length;j++){
      var tw=ctx.measureText(toks[j]).width;
      var add=row.length?sp+tw:tw;
      if(row.length&&rw+add>MW){flush(row,y,f,sp);y+=LH;row=[];rw=0;}
      row.push({t:toks[j],w:tw});rw+=row.length>1?sp+tw:tw;
    }
    if(row.length){flush(row,y,f,sp);y+=LH;}
  }
}
function flush(row,y,f,sp){
  var x=PX;
  for(var i=0;i<row.length;i++){
    words.push({t:row[i].t,w:row[i].w,f:f,bx:x,by:y,x:x,y:y,tx:x,ty:y});
    x+=row[i].w+sp;
  }
}
buildLines();
if(document.fonts&&document.fonts.ready)document.fonts.ready.then(function(){setTimeout(buildLines,80);});

/* Raven */
var rx=VW*.55,ry=VH*.32,rtx=rx,rty=ry,autoT=0,drag=false,dox=0,doy=0;
function RW(){return Math.min(VW,VH)*.36;}
var Z=[{nx:.48,ny:.45,ex:.18,ey:.20},{nx:.22,ny:.28,ex:.12,ey:.13},{nx:.10,ny:.26,ex:.07,ey:.06},{nx:.50,ny:.72,ex:.12,ey:.10},{nx:.72,ny:.58,ex:.10,ey:.08},{nx:.35,ny:.36,ex:.10,ey:.12}];

function excl(ly){
  var rw=RW(),ox=rx-rw*.5,oy=ry-rw*.5,ivs=[];
  for(var i=0;i<Z.length;i++){
    var z=Z[i],cx=ox+z.nx*rw,cy=oy+z.ny*rw;
    var ex=z.ex*rw*1.4,ey=z.ey*rw*1.6;
    var dy=Math.abs(ly-cy);
    if(dy>=ey)continue;
    var xs=ex*Math.sqrt(1-(dy/ey)*(dy/ey));
    ivs.push([cx-xs,cx+xs]);
  }
  ivs.sort(function(a,b){return a[0]-b[0];});
  var m=[];
  for(var j=0;j<ivs.length;j++){
    if(m.length&&ivs[j][0]<=m[m.length-1][1])m[m.length-1][1]=Math.max(m[m.length-1][1],ivs[j][1]);
    else m.push([ivs[j][0],ivs[j][1]]);
  }
  return m;
}
function segs(ex){
  var s=[],cur=PX,right=PX+MW,G=6;
  for(var i=0;i<ex.length;i++){var a=ex[i][0]-G,b=ex[i][1]+G;if(a>cur+10)s.push([cur,a]);if(b>cur)cur=b;}
  if(cur<right)s.push([cur,right]);
  return s.length?s:[[PX,PX+MW]];
}
function reflow(){
  if(!words.length)return;
  ctx.font=fN();var spw=ctx.measureText(" ").width;
  var wi=0,y=TOP+LH;
  while(wi<words.length){
    var by=words[wi].by,row=[];
    while(wi<words.length&&words[wi].by===by)row.push(words[wi++]);
    var ex=excl(y),sg=segs(ex),si=0,cx=sg[0][0];
    for(var ri=0;ri<row.length;ri++){
      var wd=row[ri],placed=false;
      while(si<sg.length){
        if(cx<sg[si][0])cx=sg[si][0];
        if(cx+wd.w<=sg[si][1]+1){wd.tx=cx;wd.ty=y;cx+=wd.w+spw;placed=true;break;}
        si++;if(si<sg.length)cx=sg[si][0];
      }
      if(!placed){y+=LH;ex=excl(y);sg=segs(ex);si=0;cx=sg[0][0];wd.tx=cx;wd.ty=y;cx+=wd.w+spw;}
    }
    y+=LH;
  }
}

/* Input */
function hit(ex,ey){var rw=RW();return ex>rx-rw*.55&&ex<rx+rw*.55&&ey>ry-rw*.55&&ey<ry+rw*.55;}
glC.addEventListener("mousedown",function(e){if(hit(e.clientX,e.clientY)){drag=true;dox=e.clientX-rx;doy=e.clientY-ry;glC.style.cursor="grabbing";}});
window.addEventListener("mousemove",function(e){if(drag){rtx=e.clientX-dox;rty=e.clientY-doy;}else glC.style.cursor=hit(e.clientX,e.clientY)?"grab":"default";});
window.addEventListener("mouseup",function(){drag=false;glC.style.cursor="default";});
glC.addEventListener("touchstart",function(e){e.preventDefault();var t=e.touches[0];if(hit(t.clientX,t.clientY)){drag=true;dox=t.clientX-rx;doy=t.clientY-ry;}},{passive:false});
glC.addEventListener("touchmove",function(e){e.preventDefault();if(drag){rtx=e.touches[0].clientX-dox;rty=e.touches[0].clientY-doy;}},{passive:false});
glC.addEventListener("touchend",function(){drag=false;});

/* Loop */
var last=0;
function frame(ts){
  var dt=Math.min((ts-last)/1e3,.05);last=ts;
  if(!drag){autoT+=dt*.22;var dx=VW*.52+Math.sin(autoT*.7)*VW*.14,dy=VH*.32+Math.sin(autoT)*VH*.07;rtx+=(dx-rtx)*.004;rty+=(dy-rty)*.004;}
  rx+=(rtx-rx)*.13;ry+=(rty-ry)*.13;
  if(gl){
    gl.clearColor(1,1,1,1);gl.clear(gl.COLOR_BUFFER_BIT);
    gl.useProgram(prog);
    var rw=RW();
    gl.uniform4f(uRaven,(rx-rw*.5)/VW,1-(ry+rw*.5)/VH,rw/VW,rw/VH);
    if(ravenTex){gl.activeTexture(gl.TEXTURE0);gl.bindTexture(gl.TEXTURE_2D,ravenTex);gl.uniform1i(uTex,0);}
    gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  }
  reflow();
  var L=.14;
  for(var i=0;i<words.length;i++){words[i].x+=(words[i].tx-words[i].x)*L;words[i].y+=(words[i].ty-words[i].y)*L;}
  ctx.setTransform(DPR,0,0,DPR,0,0);ctx.clearRect(0,0,VW,VH);
  ctx.textBaseline="alphabetic";ctx.shadowColor="transparent";ctx.shadowBlur=0;
  for(var i=0;i<words.length;i++){var w=words[i];if(w.y<-LH*2||w.y>VH+LH*2)continue;ctx.font=w.f;ctx.fillStyle="rgba(12,10,8,.87)";ctx.fillText(w.t,w.x,w.y);}
  ctx.font="10px Georgia,serif";ctx.fillStyle="rgba(0,0,0,.12)";ctx.fillText("drag the raven",PX,VH-16);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
