<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>The Raven</title>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
canvas { display: block; touch-action: none; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var DPR = Math.min(window.devicePixelRatio || 1, 2);
var VW = window.innerWidth;
var VH = window.innerHeight;

function resize() {
  VW = window.innerWidth; VH = window.innerHeight;
  canvas.width = VW * DPR; canvas.height = VH * DPR;
  canvas.style.width = VW + 'px'; canvas.style.height = VH + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', function() { resize(); buildLines(); });

// ── Font & layout ─────────────────────────────────────────────
var FS = Math.round(Math.min(Math.max(VW / 52, 13), 20));
var FONT = FS + 'px "IM Fell English", Georgia, serif';
var FONTI = 'italic ' + FS + 'px "IM Fell English", Georgia, serif';
var FONTB = 'bold ' + Math.round(FS * 1.4) + 'px "IM Fell English", Georgia, serif';
var LH = Math.round(FS * 2.1);
var PX = Math.round(VW * 0.07);
var MW = VW - PX * 2;
var TOP = Math.round(VH * 0.10);

// ── Full Raven poem ────────────────────────────────────────────
var POEM = [
  {t:'THE RAVEN', f:'title'},
  {t:'Edgar Allan Poe  —  1845', f:'sub'},
  {t:'', f:'gap'},
  {t:'Once upon a midnight dreary, while I pondered, weak and weary,', f:'normal'},
  {t:'Over many a quaint and curious volume of forgotten lore—', f:'normal'},
  {t:'While I nodded, nearly napping, suddenly there came a tapping,', f:'normal'},
  {t:'As of some one gently rapping, rapping at my chamber door.', f:'normal'},
  {t:'"\'Tis some visitor," I muttered, "tapping at my chamber door—', f:'normal'},
  {t:'Only this and nothing more."', f:'normal'},
  {t:'', f:'gap'},
  {t:'Ah, distinctly I remember it was in the bleak December;', f:'normal'},
  {t:'And each separate dying ember wrought its ghost upon the floor;', f:'normal'},
  {t:'Eagerly I wished the morrow;—vainly I had sought to borrow', f:'normal'},
  {t:'From my books surcease of sorrow—sorrow for the lost Lenore—', f:'normal'},
  {t:'For the rare and radiant maiden whom the angels name Lenore—', f:'normal'},
  {t:'Nameless here for evermore.', f:'normal'},
  {t:'', f:'gap'},
  {t:'And the silken, sad, uncertain rustling of each purple curtain', f:'normal'},
  {t:'Thrilled me—filled me with fantastic terrors never felt before;', f:'normal'},
  {t:'So that now, to still the beating of my heart, I stood repeating,', f:'normal'},
  {t:'"\'Tis some visitor entreating entrance at my chamber door—', f:'normal'},
  {t:'Some late visitor entreating entrance at my chamber door;—', f:'normal'},
  {t:'This it is and nothing more."', f:'normal'},
  {t:'', f:'gap'},
  {t:'Presently my soul grew stronger; hesitating then no longer,', f:'normal'},
  {t:'"Sir," said I, "or Madam, truly your forgiveness I implore;', f:'normal'},
  {t:'But the fact is I was napping, and so gently you came rapping,', f:'normal'},
  {t:'And so faintly you came tapping, tapping at my chamber door,', f:'normal'},
  {t:'That I scarce was sure I heard you"—here I opened wide the door;—', f:'normal'},
  {t:'Darkness there and nothing more.', f:'normal'},
  {t:'', f:'gap'},
  {t:'Deep into that darkness peering, long I stood there wondering, fearing,', f:'normal'},
  {t:'Doubting, dreaming dreams no mortal ever dared to dream before;', f:'normal'},
  {t:'But the silence was unbroken, and the stillness gave no token,', f:'normal'},
  {t:'And the only word there spoken was the whispered word, "Lenore?"', f:'normal'},
  {t:'This I whispered, and an echo murmured back the word, "Lenore!"—', f:'normal'},
  {t:'Merely this and nothing more.', f:'normal'},
  {t:'', f:'gap'},
  {t:'Back into the chamber turning, all my soul within me burning,', f:'normal'},
  {t:'Soon again I heard a tapping somewhat louder than before.', f:'normal'},
  {t:'"Surely," said I, "surely that is something at my window lattice;', f:'normal'},
  {t:'Let me see, then, what thereat is, and this mystery explore—', f:'normal'},
  {t:'Let my heart be still a moment and this mystery explore;—', f:'normal'},
  {t:'"\'Tis the wind and nothing more!"', f:'normal'},
  {t:'', f:'gap'},
  {t:'Open here I flung the shutter, when, with many a flirt and flutter,', f:'normal'},
  {t:'In there stepped a stately Raven of the saintly days of yore;', f:'normal'},
  {t:'Not the least obeisance made he; not a minute stopped or stayed he;', f:'normal'},
  {t:'But, with mien of lord or lady, perched above my chamber door—', f:'normal'},
  {t:'Perched upon a bust of Pallas just above my chamber door—', f:'normal'},
  {t:'Perched, and sat, and nothing more.', f:'normal'},
  {t:'', f:'gap'},
  {t:'Then this ebony bird beguiling my sad fancy into smiling,', f:'normal'},
  {t:'By the grave and stern decorum of the countenance it wore,', f:'normal'},
  {t:'"Though thy crest be shorn and shaven, thou," I said, "art sure no craven,', f:'normal'},
  {t:'Ghastly grim and ancient Raven wandering from the Nightly shore—', f:'normal'},
  {t:'Tell me what thy lordly name is on the Night\'s Plutonian shore!"', f:'normal'},
  {t:'Quoth the Raven "Nevermore."', f:'normal'},
  {t:'', f:'gap'},
  {t:'Much I marvelled this ungainly fowl to hear discourse so plainly,', f:'normal'},
  {t:'Though its answer little meaning—little relevancy bore;', f:'normal'},
  {t:'For we cannot help agreeing that no living human being', f:'normal'},
  {t:'Ever yet was blessed with seeing bird above his chamber door—', f:'normal'},
  {t:'Bird or beast upon the sculptured bust above his chamber door,', f:'normal'},
  {t:'With such name as "Nevermore."', f:'normal'},
  {t:'', f:'gap'},
  {t:'But the Raven, sitting lonely on the placid bust, spoke only', f:'normal'},
  {t:'That one word, as if his soul in that one word he did outpour.', f:'normal'},
  {t:'Nothing further then he uttered—not a feather then he fluttered—', f:'normal'},
  {t:'Till I scarcely more than muttered "Other friends have flown before—', f:'normal'},
  {t:'On the morrow he will leave me, as my Hopes have flown before."', f:'normal'},
  {t:'Then the bird said "Nevermore."', f:'normal'},
  {t:'', f:'gap'},
  {t:'"Prophet!" said I, "thing of evil!—prophet still, if bird or devil!—', f:'normal'},
  {t:'Whether Tempter sent, or whether tempest tossed thee here ashore,', f:'normal'},
  {t:'Desolate yet all undaunted, on this desert land enchanted—', f:'normal'},
  {t:'On this home by Horror haunted—tell me truly, I implore—', f:'normal'},
  {t:'Is there—is there balm in Gilead?—tell me—tell me, I implore!"', f:'normal'},
  {t:'Quoth the Raven "Nevermore."', f:'normal'},
  {t:'', f:'gap'},
  {t:'And the Raven, never flitting, still is sitting, still is sitting', f:'normal'},
  {t:'On the pallid bust of Pallas just above my chamber door;', f:'normal'},
  {t:'And his eyes have all the seeming of a demon\'s that is dreaming,', f:'normal'},
  {t:'And the lamp-light o\'er him streaming throws his shadow on the floor;', f:'normal'},
  {t:'And my soul from out that shadow that lies floating on the floor', f:'normal'},
  {t:'Shall be lifted—nevermore!', f:'normal'},
];

// ── Word store ────────────────────────────────────────────────
var words = [];
var SPW = 0;

function getFont(f) {
  if (f === 'title') return FONTB;
  if (f === 'sub')   return FONTI;
  return FONT;
}

function buildLines() {
  words = [];
  FS   = Math.round(Math.min(Math.max(VW / 52, 13), 20));
  FONT  = FS + 'px "IM Fell English", Georgia, serif';
  FONTI = 'italic ' + FS + 'px "IM Fell English", Georgia, serif';
  FONTB = 'bold ' + Math.round(FS * 1.4) + 'px "IM Fell English", Georgia, serif';
  LH   = Math.round(FS * 2.1);
  PX   = Math.round(VW * 0.07);
  MW   = VW - PX * 2;
  TOP  = Math.round(VH * 0.10);

  ctx.font = FONT;
  SPW = ctx.measureText(' ').width;

  var y = TOP + LH;

  for (var pi = 0; pi < POEM.length; pi++) {
    var line = POEM[pi];
    if (line.f === 'gap' || line.t === '') { y += LH * 0.5; continue; }

    var fnt = getFont(line.f);
    ctx.font = fnt;
    var sp = ctx.measureText(' ').width;
    var toks = line.t.split(' ').filter(function(s) { return s.length > 0; });
    var row = [], rw = 0;

    for (var ti = 0; ti < toks.length; ti++) {
      var tok = toks[ti];
      var tw = ctx.measureText(tok).width;
      var add = row.length ? sp + tw : tw;
      if (row.length && rw + add > MW) {
        flushRow(row, y, fnt, sp); y += LH; row = []; rw = 0;
      }
      row.push({ text: tok, w: tw });
      rw += row.length > 1 ? sp + tw : tw;
    }
    if (row.length) { flushRow(row, y, fnt, sp); y += LH; }
  }
}

function flushRow(row, y, fnt, sp) {
  var x = PX;
  for (var i = 0; i < row.length; i++) {
    var wd = row[i];
    words.push({ text: wd.text, w: wd.w, font: fnt, baseX: x, baseY: y, x: x, y: y, tx: x, ty: y });
    x += wd.w + sp;
  }
}

buildLines();

// Rebuild once fonts are actually ready
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(function() {
    setTimeout(function() { buildLines(); }, 50);
  });
}

// ── Raven ─────────────────────────────────────────────────────
var RS = Math.min(VW, VH) / 400;
var rx = VW * 0.55, ry = VH * 0.30;
var rtx = rx, rty = ry;
var rAngle = 0;
var flapT = 0;
var autoT = 0;
var dragging = false;
var dragOX = 0, dragOY = 0;

// Exclusion circles in local raven space
var RC = [
  { dx: 0,   dy: 0,   r: 36 },
  { dx:-52,  dy:-8,   r: 22 },
  { dx: 52,  dy:-8,   r: 22 },
  { dx:-90,  dy: 0,   r: 16 },
  { dx: 90,  dy: 0,   r: 16 },
  { dx:-22,  dy:-18,  r: 13 },
  { dx: 28,  dy: 14,  r: 12 },
];

function exclusionsForY(lineY) {
  var ivs = [];
  var cos = Math.cos(rAngle), sin = Math.sin(rAngle);
  for (var i = 0; i < RC.length; i++) {
    var c = RC[i];
    var wcx = (c.dx * cos - c.dy * sin) * RS + rx;
    var wcy = (c.dx * sin + c.dy * cos) * RS + ry;
    var wr  = c.r * RS * 1.5;
    var dy2 = Math.abs(lineY - wcy);
    if (dy2 >= wr) continue;
    var xs = Math.sqrt(wr*wr - dy2*dy2);
    ivs.push([wcx - xs, wcx + xs]);
  }
  ivs.sort(function(a,b){ return a[0]-b[0]; });
  var merged = [];
  for (var j = 0; j < ivs.length; j++) {
    var iv = ivs[j];
    if (merged.length && iv[0] <= merged[merged.length-1][1])
      merged[merged.length-1][1] = Math.max(merged[merged.length-1][1], iv[1]);
    else merged.push([iv[0], iv[1]]);
  }
  return merged;
}

function freeSegs(excl) {
  var segs = [], cur = PX, right = PX + MW, GAP = SPW * 0.6;
  for (var i = 0; i < excl.length; i++) {
    var a = excl[i][0], b = excl[i][1];
    if (cur + 20 < a - GAP) segs.push([cur, a - GAP]);
    cur = b + GAP;
  }
  if (cur < right) segs.push([cur, right]);
  return segs.length ? segs : [[PX, PX + MW]];
}

// ── Reflow text around raven ───────────────────────────────────
function reflow() {
  if (!words.length) return;
  ctx.font = FONT;
  var spw = ctx.measureText(' ').width;
  var wi = 0;
  var y = TOP + LH;

  while (wi < words.length) {
    var lineBaseY = words[wi].baseY;
    // Gather this logical line
    var row = [];
    while (wi < words.length && words[wi].baseY === lineBaseY) {
      row.push(words[wi]); wi++;
    }

    var excl = exclusionsForY(y);
    var segs = freeSegs(excl);

    // Place words into segments
    var si = 0, cx2 = segs[0][0];
    for (var ri = 0; ri < row.length; ri++) {
      var wd = row[ri];
      ctx.font = wd.font;
      var placed = false;
      while (si < segs.length) {
        if (cx2 + wd.w <= segs[si][1] + 1) {
          wd.tx = cx2; wd.ty = y;
          cx2 += wd.w + spw;
          placed = true; break;
        }
        si++;
        if (si < segs.length) cx2 = segs[si][0];
      }
      if (!placed) {
        y += LH;
        excl = exclusionsForY(y);
        segs = freeSegs(excl);
        si = 0; cx2 = segs[0][0];
        wd.tx = cx2; wd.ty = y;
        cx2 += wd.w + spw;
      }
    }
    y += LH;
  }
}

// ── Draw raven ─────────────────────────────────────────────────
function drawRaven() {
  ctx.save();
  ctx.translate(rx, ry);
  ctx.rotate(rAngle);
  ctx.scale(RS, RS);

  var flap = Math.sin(flapT) * 14;

  ctx.fillStyle = '#111';
  ctx.shadowColor = 'rgba(0,0,0,0.15)';
  ctx.shadowBlur = 18 / RS;
  ctx.shadowOffsetY = 3 / RS;

  // Body
  ctx.beginPath();
  ctx.moveTo(20, 2);
  ctx.bezierCurveTo(20,-14, 2,-20,-18,-10);
  ctx.bezierCurveTo(-28,-5,-28, 7,-18, 12);
  ctx.bezierCurveTo(2, 18, 20, 12, 20, 2);
  ctx.fill();

  // Left wing
  ctx.beginPath();
  ctx.moveTo(-4,-6);
  ctx.bezierCurveTo(-24,-12-flap,-60,-20-flap*0.6,-90,-4-flap*0.3);
  ctx.bezierCurveTo(-72, 0,-42, 8,-6, 4);
  ctx.closePath(); ctx.fill();

  // Right wing
  ctx.beginPath();
  ctx.moveTo(4,-6);
  ctx.bezierCurveTo(24,-12-flap, 60,-20-flap*0.6, 90,-4-flap*0.3);
  ctx.bezierCurveTo(72, 0, 42, 8, 6, 4);
  ctx.closePath(); ctx.fill();

  // Head
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.arc(-23,-17, 12, 0, Math.PI*2);
  ctx.fill();

  // Beak
  ctx.beginPath();
  ctx.moveTo(-32,-20);
  ctx.lineTo(-54,-17);
  ctx.lineTo(-32,-11);
  ctx.closePath(); ctx.fill();

  // Tail
  ctx.beginPath();
  ctx.moveTo(18, 8);
  ctx.bezierCurveTo(28, 10, 48, 26, 52, 32);
  ctx.bezierCurveTo(44, 22, 36, 28, 30, 20);
  ctx.closePath(); ctx.fill();

  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-26,-19, 3.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath(); ctx.arc(-27,-19, 1.8, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

// ── Draw text ─────────────────────────────────────────────────
function drawText() {
  ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
  ctx.textBaseline = 'alphabetic';
  for (var i = 0; i < words.length; i++) {
    var w = words[i];
    if (w.y < -LH * 2 || w.y > VH + LH * 2) continue;
    ctx.font = w.font;
    ctx.fillStyle = 'rgba(12,10,8,0.85)';
    ctx.fillText(w.text, w.x, w.y);
  }
}

// ── Pointer ───────────────────────────────────────────────────
function hitTest(ex, ey) {
  return Math.hypot(ex - rx, ey - ry) < 95 * RS;
}

canvas.addEventListener('mousedown', function(e) {
  if (hitTest(e.clientX, e.clientY)) {
    dragging = true; dragOX = e.clientX - rx; dragOY = e.clientY - ry;
    canvas.style.cursor = 'grabbing';
  }
});
window.addEventListener('mousemove', function(e) {
  if (dragging) { rtx = e.clientX - dragOX; rty = e.clientY - dragOY; }
  else canvas.style.cursor = hitTest(e.clientX, e.clientY) ? 'grab' : 'default';
});
window.addEventListener('mouseup', function() { dragging = false; canvas.style.cursor = 'default'; });

canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var t = e.touches[0];
  if (hitTest(t.clientX, t.clientY)) {
    dragging = true; dragOX = t.clientX - rx; dragOY = t.clientY - ry;
  }
}, { passive: false });
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  if (dragging) { rtx = e.touches[0].clientX - dragOX; rty = e.touches[0].clientY - dragOY; }
}, { passive: false });
canvas.addEventListener('touchend', function() { dragging = false; });

// ── Loop ──────────────────────────────────────────────────────
var last = 0;
function frame(ts) {
  var dt = Math.min((ts - last) / 1000, 0.05); last = ts;

  flapT += dt * (dragging ? 5 : 2.4);

  if (!dragging) {
    autoT += dt * 0.26;
    var driftX = VW * 0.5 + Math.sin(autoT * 0.85) * VW * 0.18;
    var driftY = VH * 0.30 + Math.sin(autoT) * VH * 0.09;
    rtx += (driftX - rtx) * 0.004;
    rty += (driftY - rty) * 0.004;
  }

  rx += (rtx - rx) * 0.13;
  ry += (rty - ry) * 0.13;
  rAngle = (rtx - rx) * 0.003;

  reflow();

  var L = 0.15;
  for (var i = 0; i < words.length; i++) {
    words[i].x += (words[i].tx - words[i].x) * L;
    words[i].y += (words[i].ty - words[i].y) * L;
  }

  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, VW, VH);

  drawText();
  drawRaven();

  // hint
  ctx.font = '10px Georgia, serif';
  ctx.fillStyle = 'rgba(0,0,0,0.13)';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('touch the raven · drag · watch the poem move', PX, VH - 16);

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
