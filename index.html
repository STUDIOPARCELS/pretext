var offCvs = document.createElement('canvas');
var offCtx = offCvs.getContext('2d');
var ravenReady = false;
var img = new Image();
img.onload = function() {
  offCvs.width  = img.naturalWidth;
  offCvs.height = img.naturalHeight;
  offCtx.clearRect(0,0,offCvs.width,offCvs.height);
  offCtx.drawImage(img,0,0);
  /* Convert: dark pixels → black+opaque, light pixels → transparent */
  try {
    var id = offCtx.getImageData(0,0,offCvs.width,offCvs.height);
    var d  = id.data;
    for (var i=0;i<d.length;i+=4) {
      var lum = 0.299*d[i] + 0.587*d[i+1] + 0.114*d[i+2];
      if (lum < 200) {
        var a = Math.round((1 - lum/200)*255);
        d[i]=0; d[i+1]=0; d[i+2]=0; d[i+3]=Math.min(a,255);
      } else { d[i+3]=0; }
    }
    offCtx.putImageData(id,0,0);
  } catch(e) { /* CORS guard — shouldn't happen with data URL */ }
  ravenReady = true;
};
img.src = IMG_SRC;

/* ── Canvas setup ─────────────────────────────────────────── */
var canvas = document.getElementById('c');
var ctx    = canvas.getContext('2d');
var DPR    = Math.min(window.devicePixelRatio||1, 2);
var VW, VH;

function resize() {
  VW = window.innerWidth; VH = window.innerHeight;
  canvas.width  = VW*DPR; canvas.height = VH*DPR;
  canvas.style.width  = VW+'px'; canvas.style.height = VH+'px';
  ctx.setTransform(DPR,0,0,DPR,0,0);
}
resize();

/* ── Typography ───────────────────────────────────────────── */
var FS,LH,PX,MW,TOP;
function initTypo() {
  FS  = Math.round(Math.min(Math.max(VW/52,13),20));
  LH  = Math.round(FS*2.15);
  PX  = Math.round(VW*0.07);
  MW  = VW - PX*2;
  TOP = Math.round(VH*0.09);
}
initTypo();

function fN() { return FS+'px "IM Fell English",Georgia,serif'; }
function fI() { return 'italic '+FS+'px "IM Fell English",Georgia,serif'; }
function fB() { return 'bold '+Math.round(FS*1.5)+'px "IM Fell English",Georgia,serif'; }

/* ── The Raven, Poe 1845 ──────────────────────────────────── */
var POEM = [
  ['THE RAVEN','B'],['Edgar Allan Poe  ·  1845','I'],['','G'],
  ['Once upon a midnight dreary, while I pondered, weak and weary,','N'],
  ['Over many a quaint and curious volume of forgotten lore—','N'],
  ['While I nodded, nearly napping, suddenly there came a tapping,','N'],

  ['"Tis some visitor," I muttered, "tapping at my chamber door—','N'],
  ['Only this and nothing more."','N'],['','G'],
  ['Ah, distinctly I remember it was in the bleak December;','N'],
  ['And each separate dying ember wrought its ghost upon the floor;','N'],
  ['Eagerly I wished the morrow;—vainly I had sought to borrow','N'],
  ['From my books surcease of sorrow—sorrow for the lost Lenore—','N'],
  ['For the rare and radiant maiden whom the angels name Lenore—','N'],
  ['Nameless here for evermore.','N'],['','G'],
  ['And the silken, sad, uncertain rustling of each purple curtain','N'],
  ['Thrilled me—filled me with fantastic terrors never felt before;','N'],
  ['So that now, to still the beating of my heart, I stood repeating,','N'],
  ['"Tis some visitor entreating entrance at my chamber door—','N'],
  ['Some late visitor entreating entrance at my chamber door;—','N'],
  ['This it is and nothing more."','N'],['','G'],
  ['Presently my soul grew stronger; hesitating then no longer,','N'],
  ['"Sir," said I, "or Madam, truly your forgiveness I implore;','N'],

/* ── Word list ────────────────────────────────────────────── */
var words = [];
function fontForCode(c) {
  if (c==='B') return fB();
  if (c==='I') return fI();
  return fN();
}

function buildLines() {
  initTypo();
  words = [];
  var y = TOP + LH;
  for (var pi=0; pi<POEM.length; pi++) {
    var txt = POEM[pi][0], code = POEM[pi][1];
    if (code==='G' || !txt) { y += LH*0.5; continue; }
    var f  = fontForCode(code);
    ctx.font = f;
    var sp = ctx.measureText(' ').width;
    var toks = txt.split(' ').filter(function(s){return s.length>0;});
    var row=[], rw=0;
    for (var ti=0; ti<toks.length; ti++) {
      var tok=toks[ti], tw=ctx.measureText(tok).width;
      var add = row.length ? sp+tw : tw;
      if (row.length && rw+add > MW) { pushRow(row,y,f,sp); y+=LH; row=[]; rw=0; }
      row.push({t:tok,w:tw});
      rw += row.length>1 ? sp+tw : tw;
    }
    if (row.length) { pushRow(row,y,f,sp); y+=LH; }
  }
}
function pushRow(row,y,f,sp) {
  var x=PX;
  for (var i=0;i<row.length;i++) {
    words.push({t:row[i].t, w:row[i].w, f:f, bx:x, by:y, x:x, y:y, tx:x, ty:y});
    x += row[i].w + sp;
  }
}
buildLines();
if (document.fonts && document.fonts.ready) {
  document.fonts.ready.then(function(){ setTimeout(buildLines, 80); });
}

/* ── Raven physics ────────────────────────────────────────── */
/* Image natural size ~240×240 (square). Raven faces left, standing. */
/* We render it at RW×RH pixels centered on (rx,ry).               */
var rx=VW*0.55, ry=VH*0.32, rtx=rx, rty=ry;
var autoT=0, dragging=false, dox=0, doy=0;

function RW() { return Math.min(VW,VH)*0.34; }
function RH() { return RW(); } /* square source image */

/* Exclusion: ellipses mapped to raven anatomy in normalised [0,1] space */
/* Raven occupies roughly: body 0.2-0.8 x, 0.25-0.75 y                  */
var ZONES = [
  {nx:0.48, ny:0.45, erx:0.18, ery:0.20}, /* body */
  {nx:0.22, ny:0.28, erx:0.12, ery:0.13}, /* head */
  {nx:0.10, ny:0.26, erx:0.07, ery:0.06}, /* beak */
  {nx:0.50, ny:0.70, erx:0.12, ery:0.10}, /* legs */
  {nx:0.72, ny:0.58, erx:0.10, ery:0.08}, /* tail */
  {nx:0.35, ny:0.35, erx:0.10, ery:0.12}, /* neck/upper body */
];

function exclusionsForY(ly) {
  var rw=RW(), rh=RH();
  var imgX = rx - rw*0.5, imgY = ry - rh*0.5;
  var ivs=[];
  for (var i=0;i<ZONES.length;i++) {
    var z=ZONES[i];
    var cx = imgX + z.nx*rw,  cy = imgY + z.ny*rh;
    var ex = z.erx*rw*1.35,   ey = z.ery*rh*1.55;
    var dy = Math.abs(ly-cy);
    if (dy>=ey) continue;
    var xs = ex * Math.sqrt(1-(dy/ey)*(dy/ey));
    ivs.push([cx-xs, cx+xs]);
  }
  ivs.sort(function(a,b){return a[0]-b[0];});
  var m=[];
  for (var j=0;j<ivs.length;j++) {
    if (m.length && ivs[j][0]<=m[m.length-1][1])
      m[m.length-1][1]=Math.max(m[m.length-1][1],ivs[j][1]);
    else m.push([ivs[j][0],ivs[j][1]]);
  }
  return m;
}

function freeSegs(excl) {
  var segs=[], cur=PX, right=PX+MW, G=ctx.measureText(' ').width*0.5;
  for (var i=0;i<excl.length;i++) {
    var a=excl[i][0]-G, b=excl[i][1]+G;
    if (a > cur+10) segs.push([cur, a]);
    if (b > cur)    cur=b;
  }
  if (cur < right) segs.push([cur, right]);
  /* Always return at least one segment that's within page bounds */
  if (!segs.length) segs.push([PX, PX+MW]);
  return segs;
}

/* ── Reflow ────────────────────────────────────────────────── */
function reflow() {
  if (!words.length) return;
  var wi=0, y=TOP+LH;
  ctx.font = fN();
  var spw = ctx.measureText(' ').width;
  while (wi<words.length) {
    var by=words[wi].by, row=[];
    while (wi<words.length && words[wi].by===by) row.push(words[wi++]);
    var excl=exclusionsForY(y), segs=freeSegs(excl);
    var si=0, cx2=segs[0][0];
    for (var ri=0;ri<row.length;ri++) {
      var wd=row[ri];
      var placed=false;
      while (si<segs.length) {
        /* Clamp cx2 to segment start */
        if (cx2 < segs[si][0]) cx2=segs[si][0];
        if (cx2+wd.w <= segs[si][1]+1) {
          wd.tx=cx2; wd.ty=y; cx2+=wd.w+spw; placed=true; break;
        }
        si++; if (si<segs.length) cx2=segs[si][0];
      }
      if (!placed) {
        /* Overflow to next line */
        y+=LH; excl=exclusionsForY(y); segs=freeSegs(excl);
        si=0; cx2=segs[0][0];
        wd.tx=cx2; wd.ty=y; cx2+=wd.w+spw;
      }
    }
    y+=LH;
  }
}

/* ── Draw ──────────────────────────────────────────────────── */
function drawRaven() {
  var rw=RW(), rh=RH();
  if (ravenReady) {
    ctx.drawImage(offCvs, rx-rw*0.5, ry-rh*0.5, rw, rh);
  } else {
    /* Placeholder while image processes */
    ctx.fillStyle='rgba(0,0,0,0.08)';
    ctx.beginPath(); ctx.ellipse(rx,ry,rw*0.35,rh*0.28,0,0,Math.PI*2); ctx.fill();
  }
}

function drawText() {
  ctx.shadowColor='transparent'; ctx.shadowBlur=0;
  ctx.textBaseline='alphabetic'; ctx.fillStyle='rgba(12,10,8,0.86)';
  for (var i=0;i<words.length;i++) {
    var w=words[i];
    if (w.y < -LH*2 || w.y > VH+LH*2) continue;
    ctx.font=w.f; ctx.fillText(w.t, w.x, w.y);
  }
}

/* ── Pointer ───────────────────────────────────────────────── */
function hit(ex,ey) {
  var rw=RW(),rh=RH();
  return ex>rx-rw*0.55&&ex<rx+rw*0.55&&ey>ry-rh*0.55&&ey<ry+rh*0.55;
}
canvas.addEventListener('mousedown',function(e){
  if(hit(e.clientX,e.clientY)){dragging=true;dox=e.clientX-rx;doy=e.clientY-ry;canvas.style.cursor='grabbing';}
});
window.addEventListener('mousemove',function(e){
  if(dragging){rtx=e.clientX-dox;rty=e.clientY-doy;}
  else canvas.style.cursor=hit(e.clientX,e.clientY)?'grab':'default';
});
window.addEventListener('mouseup',function(){dragging=false;canvas.style.cursor='default';});
canvas.addEventListener('touchstart',function(e){
  e.preventDefault();var t=e.touches[0];
  if(hit(t.clientX,t.clientY)){dragging=true;dox=t.clientX-rx;doy=t.clientY-ry;}
},{passive:false});
canvas.addEventListener('touchmove',function(e){
  e.preventDefault();if(dragging){rtx=e.touches[0].clientX-dox;rty=e.touches[0].clientY-doy;}
},{passive:false});
canvas.addEventListener('touchend',function(){dragging=false;});

/* ── Loop ──────────────────────────────────────────────────── */
var last=0;
function frame(ts) {
  var dt=Math.min((ts-last)/1000,0.05); last=ts;
  if (!dragging) {
    autoT+=dt*0.22;
    var dx=VW*0.52+Math.sin(autoT*0.7)*VW*0.14;
    var dy2=VH*0.32+Math.sin(autoT)*VH*0.07;
    rtx+=(dx-rtx)*0.004; rty+=(dy2-rty)*0.004;
  }
  rx+=(rtx-rx)*0.13; ry+=(rty-ry)*0.13;
  reflow();
  var L=0.14;
  for (var i=0;i<words.length;i++) {
    words[i].x+=(words[i].tx-words[i].x)*L;
    words[i].y+=(words[i].ty-words[i].y)*L;
  }
  ctx.setTransform(DPR,0,0,DPR,0,0);
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,VW,VH);
  drawText();
  drawRaven();
  ctx.font='10px Georgia,serif'; ctx.fillStyle='rgba(0,0,0,0.12)';
  ctx.textBaseline='alphabetic';
  ctx.fillText('drag the raven',PX,VH-16);
  requestAnimationFrame(frame);
}
window.addEventListener('resize',function(){resize();buildLines();});
requestAnimationFrame(frame);
</script>
